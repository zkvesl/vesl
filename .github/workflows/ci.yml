name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main]

# AUDIT 2026-05-19 H-22: the test / audit / clippy jobs check out the
# sibling nockchain monorepo at NOCK_PIN so vesl-core's nockchain
# path-deps resolve. NOCK_PIN mirrors jam-determinism.yml and sync.sh —
# scripts/check-pins.sh gates the match.
#
# Same pattern for VESL_WALLET_PIN: vesl-core has path-deps to
# `../../../vesl-wallet/crates/{vesl-signing,vesl-wallet-spec,vesl-wallet}`,
# so CI checks out vesl-wallet as a sibling. Bump this when vesl-wallet
# ships a compatible release.
env:
  NOCK_PIN: fe46f4e3a0ce9532288e9cf3a3fb7e94bf9cba1f
  VESL_WALLET_PIN: f19904e61dc085ed96dede6c354ecee3a53c6d63

jobs:
  check-pins:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: scripts/check-pins.sh
        run: ./scripts/check-pins.sh

  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout vesl-core
        uses: actions/checkout@v4
        with:
          path: vesl-core
      - name: Checkout nockchain (sibling)
        uses: actions/checkout@v4
        with:
          repository: nockchain/nockchain
          ref: ${{ env.NOCK_PIN }}
          path: nockchain
      - name: Checkout vesl-wallet (sibling)
        uses: actions/checkout@v4
        with:
          repository: zkvesl/vesl-wallet
          ref: ${{ env.VESL_WALLET_PIN }}
          path: vesl-wallet
      - name: Install protoc
        # nockchain's nockapp-grpc-proto crate needs the protobuf compiler
        # at build-time; the runner image doesn't ship it.
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler
      - uses: dtolnay/rust-toolchain@nightly
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: vesl-core
      - name: Run tests (vesl-core)
        run: cargo test -p vesl-core
        working-directory: vesl-core

  audit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout vesl-core
        uses: actions/checkout@v4
        with:
          path: vesl-core
      - name: Checkout nockchain (sibling)
        uses: actions/checkout@v4
        with:
          repository: nockchain/nockchain
          ref: ${{ env.NOCK_PIN }}
          path: nockchain
      - name: Checkout vesl-wallet (sibling)
        uses: actions/checkout@v4
        with:
          repository: zkvesl/vesl-wallet
          ref: ${{ env.VESL_WALLET_PIN }}
          path: vesl-wallet
      - name: Install protoc
        # nockchain's nockapp-grpc-proto crate needs the protobuf compiler
        # at build-time; the runner image doesn't ship it.
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler
      - uses: dtolnay/rust-toolchain@nightly
      - name: Install cargo-audit
        run: cargo install cargo-audit
      - name: Audit dependencies (vesl-core)
        run: cargo audit
        working-directory: vesl-core

  clippy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout vesl-core
        uses: actions/checkout@v4
        with:
          path: vesl-core
      - name: Checkout nockchain (sibling)
        uses: actions/checkout@v4
        with:
          repository: nockchain/nockchain
          ref: ${{ env.NOCK_PIN }}
          path: nockchain
      - name: Checkout vesl-wallet (sibling)
        uses: actions/checkout@v4
        with:
          repository: zkvesl/vesl-wallet
          ref: ${{ env.VESL_WALLET_PIN }}
          path: vesl-wallet
      - name: Install protoc
        # nockchain's nockapp-grpc-proto crate needs the protobuf compiler
        # at build-time; the runner image doesn't ship it.
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler
      - uses: dtolnay/rust-toolchain@nightly
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: vesl-core
      - name: Clippy (vesl-core)
        run: cargo clippy -p vesl-core -- -D warnings
        working-directory: vesl-core
