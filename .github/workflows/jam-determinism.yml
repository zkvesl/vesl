name: JAM Determinism

# Recompiles each kernel from protocol/lib/*.hoon and asserts the resulting
# JAM sha256 matches scripts/CHECKSUMS.sha256 (the maintainer's reference).
#
# DISABLED (2026-05-25): the gate is over-strict for our build model. The
# committed kernel JAMs are byte-shipped artifacts produced by the maintainer
# environment (preflight `scripts/check-jam.sh` is the local gate). CI's
# hoonc binary — even when built from the same nockchain SHA and pinned
# rustc — produces different output bytes than the local hoonc, almost
# certainly due to glibc / system-lib differences between ubuntu-latest
# and the maintainer's distro. The gate as written cannot tell apart
# "kernel source changed unintentionally" from "you're rebuilding on a
# different OS." Users consume the committed JAMs via include_bytes!,
# not via local rebuild + SHA check, so the trust model is "we ship,
# you trust" — not "rebuild and verify."
#
# Re-enable once we land a reproducible-build setup (e.g. a fixed-glibc
# container in the workflow that produces canonical JAM bytes). Until
# then, scripts/check-jam.sh in the local preflight is the canonical
# gate.
#
# Local equivalent: scripts/check-jam.sh (still required by the pre-push hook).
#
# Pins nockchain to NOCK_PIN (mirrored from vesl-nockup/sync.sh). Bump both
# when sibling nockchain moves.

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main]

env:
  NOCK_PIN: fe46f4e3a0ce9532288e9cf3a3fb7e94bf9cba1f

jobs:
  jam-determinism:
    if: false  # see header — gate disabled pending portable hoonc env
    runs-on: ubuntu-latest
    steps:
      - name: Checkout vesl-core
        uses: actions/checkout@v4
        with:
          path: vesl-core

      - name: Checkout nockchain (sibling)
        uses: actions/checkout@v4
        with:
          repository: nockchain/nockchain
          ref: ${{ env.NOCK_PIN }}
          path: nockchain

      - uses: dtolnay/rust-toolchain@nightly

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: nockchain

      - name: Cache hoonc binary
        id: hoonc-cache
        uses: actions/cache@v4
        with:
          path: ~/.cargo/bin/hoonc
          key: hoonc-${{ env.NOCK_PIN }}

      - name: Install hoonc (cache miss only)
        if: steps.hoonc-cache.outputs.cache-hit != 'true'
        working-directory: nockchain
        run: make install-hoonc

      - name: Set up hoon symlinks
        working-directory: vesl-core
        env:
          NOCK_HOME: ${{ github.workspace }}/nockchain
        run: ./scripts/setup-hoon-tree.sh

      - name: Run check-jam.sh
        working-directory: vesl-core
        env:
          NOCK_HOME: ${{ github.workspace }}/nockchain
        run: ./scripts/check-jam.sh
